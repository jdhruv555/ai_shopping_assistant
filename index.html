<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Shopping Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-overlay" aria-hidden="true"></div>

    <main class="page-wrap">
      <header class="hero-card">
        <p class="eyebrow">Flowise + OpenRouter</p>
        <h1>AI Shopping Assistant</h1>
        <p class="subtitle">
          Get 3 smart product recommendations based on your category and budget.
        </p>
        <div class="chips">
          <span>Welcome</span>
          <span>Category</span>
          <span>Budget</span>
          <span>Recommendation</span>
          <span>End</span>
        </div>
      </header>

      <section class="assistant-shell" aria-label="Shopping assistant chat area">
        <div class="assistant-head">
          <div class="dot"></div>
          <h2>Talk to your assistant</h2>
        </div>

        <div class="assistant-body">
          <p class="hint">
            Chat naturally or use quick options below to get product recommendations.
          </p>

          <div class="config-row">
            <label for="openrouter-key">OpenRouter API Key (optional)</label>
            <div class="config-input-wrap">
              <input
                id="openrouter-key"
                type="password"
                placeholder="sk-or-v1-..."
                autocomplete="off"
              />
              <button id="save-key-btn" type="button">Save Key</button>
            </div>
          </div>

          <div class="quick-categories" aria-label="Quick categories">
            <button class="quick-category-btn" data-value="laptop" type="button">Laptop</button>
            <button class="quick-category-btn" data-value="phone" type="button">Phone</button>
            <button class="quick-category-btn" data-value="earbuds" type="button">Earbuds</button>
            <button class="quick-category-btn" data-value="shoes" type="button">Shoes</button>
          </div>

          <div class="demo-actions">
            <button id="run-demo-btn" type="button">Run Demo Conversation</button>
            <button id="reset-chat-btn" type="button">Reset Chat</button>
          </div>

          <div id="chat-log" class="chat-log" aria-live="polite"></div>

          <form id="chat-form" class="chat-form">
            <input
              id="chat-input"
              type="text"
              placeholder="Type your answer..."
              autocomplete="off"
              required
            />
            <button id="send-btn" type="submit">Send</button>
          </form>
        </div>
      </section>

      <footer class="footnote">
        <p>Made by Dhruv Jha</p>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
